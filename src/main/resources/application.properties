spring.application.name=insighton-front

server.port=8080

# front가 어디에 있던 Eureka한테 등록하기 위해 찾는 주소, 하나가 죽어도 다른 쪽으로 등록/조회 하능하게 함
eureka.client.service-url.defaultZone=http://${EUREKA_USERNAME:testuser}:${EUREKA_PASSWORD:testpass}@insighton-eureka-1:8761/eureka/,http://${EUREKA_USERNAME:testuser}:${EUREKA_PASSWORD:testpass}@insighton-eureka-2:8761/eureka/

# ip 기반 등록, container 환경에서는 필요함
eureka.instance.prefer-ip-address=true

eureka.client.register-with-eureka=false
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=health
